image: ${BENCHMARKS_REGISTRY}/${BENCHMARKS_CONTAINER}:${BENCHMARKS_TAG}

variables:
  DETECTOR: "epic"
  DETECTOR_VERSION: "main"
  DETECTOR_CONFIG: 'epic_craterlake'

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "webide"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'

default:
  before_script:
    - ls -lrth && pwd
  artifacts:
    expire_in: 72 hours 
    paths:
      - .local/detector
      - .local/lib
      - .local/bin
      - .local/include
      - .local/share
      - results
      - config
      - .env
    reports:
      dotenv: .env

stages:
  - config0
  - config
  - initialize
  - data_init
  - simulate
  - benchmarks
  - deploy

common:variables:
  stage: config0
  rules:
    - if: '$CI_SERVER_HOST == "eicweb.phy.anl.gov"' 
  script:
    - |
      echo "   CI_PIPELINE_SOURCE = ${CI_PIPELINE_SOURCE}"
      if [[ "${CI_PIPELINE_SOURCE}" == "push"  || "x${CI_PIPELINE_SOURCE}" == "xmerge_request_event"  || "$CI_COMMIT_BRANCH" == "master" ]]; then
        export COMMON_BENCH_VERSION=${CI_COMMIT_REF_NAME}
        echo "COMMON_BENCH_VERSION=${CI_COMMIT_REF_NAME}" >> .env
        #echo "DETECTOR=${DETECTOR}" >> .env
        #echo "DETECTOR_VERSION=${DETECTOR_VERSION}" >> .env
      fi
      echo "COMMON_BENCH_VERSION = ${COMMON_BENCH_VERSION}"

common:setup:
  stage: config
  needs: ["common:variables"]
  rules:
    - if: '$CI_SERVER_HOST == "eicweb.phy.anl.gov"' 
  script:
    - git clone -b ${CI_COMMIT_REF_NAME} https://eicweb.phy.anl.gov/EIC/benchmarks/common_bench.git setup 
    - source setup/bin/env.sh && ./setup/bin/install_common.sh
    - bin/mkdir_local_data_link sim_output 
    - print_env.sh
    - ls -lrth

detector_benchmarks:
  stage: benchmarks
  rules:
    - if: '$CI_SERVER_HOST == "eicweb.phy.anl.gov"' 
  needs: ["common:variables"]
  trigger:
    project: EIC/benchmarks/detector_benchmarks
    strategy: depend
  parallel:
    matrix:
      - DETECTOR: 'epic'
        DETECTOR_CONFIG: ['epic_craterlake']
        DETECTOR_VERSION: 'main'
        DETECTOR_REPOSITORYURL: 'https://github.com/eic/epic.git'
        COMMON_BENCH_VERSION: "$COMMON_BENCH_VERSION"

reconstruction_benchmarks:
  stage: benchmarks
  rules:
    - if: '$CI_SERVER_HOST == "eicweb.phy.anl.gov"' 
  needs: ["common:variables"]
  trigger:
    project: EIC/benchmarks/reconstruction_benchmarks
    strategy: depend
  parallel:
    matrix:
      - DETECTOR: 'epic'
        DETECTOR_CONFIG: ['epic_craterlake']
        DETECTOR_VERSION: 'main'
        DETECTOR_REPOSITORYURL: 'https://github.com/eic/epic.git'
        COMMON_BENCH_VERSION: "$COMMON_BENCH_VERSION"

physics_benchmarks:
  stage: benchmarks
  rules:
    - if: '$CI_SERVER_HOST == "eicweb.phy.anl.gov"' 
  needs: ["common:variables"]
  trigger:
    project: EIC/benchmarks/physics_benchmarks
    strategy: depend
  parallel:
    matrix:
      - DETECTOR: 'epic'
        DETECTOR_CONFIG: ['epic_craterlake']
        DETECTOR_VERSION: 'main'
        DETECTOR_REPOSITORYURL: 'https://github.com/eic/epic.git'
        COMMON_BENCH_VERSION: "$COMMON_BENCH_VERSION"


other_detector_benchmarks:
  stage: benchmarks
  rules:
    - if: '$CI_SERVER_HOST == "eicweb.phy.anl.gov"' 
  needs: ["common:variables"]
  trigger:
    project: EIC/benchmarks/detector_benchmarks
  parallel:
    matrix:
      - DETECTOR: 'DII'
        DETECTOR_VERSION: 'main'
        BEAMLINE: 'ip8'
        COMMON_BENCH_VERSION: "$COMMON_BENCH_VERSION"

