common:setup:
  stage: config
  artifacts:
    expire_in: 72 hours 
    paths:
      - .local/detector
      - .local/lib
      - .local/bin
      - .local/include
      - .local/share
      - results
      - config
  script:
    - git clone "${CI_REPOSITORY_URL}" setup 
    - source setup/bin/env.sh && ./setup/bin/build_common.sh

common:detector:
  stage: initialize
  needs: ["common:setup"]
  artifacts:
    expire_in: 72 hours 
    paths:
      - .local/detector
      - .local/lib
      - .local/bin
      - .local/include
      - .local/share
      - results
      - config
  script:
    - source .local/bin/env.sh && build_detector.sh
    - mkdir -p /scratch/${CI_PROJECT_NAME}_${CI_PIPELINE_ID}
    - mkdir -p /scratch/${CI_PROJECT_NAME}_${CI_PIPELINE_ID}/sim_output
    - print_env.sh
